<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget VIP Recompensa</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        }

    .vip-widget {
    position: fixed;
    bottom: 160px;              /* 👈 ALTURA PERFECTA */
    left: 50%;
    transform: translateX(-50%) scale(0.85);

    width: 500px;
    min-height: 95px;
    padding: 16px 20px;

    border-radius: 26px;

    background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 42%),
        linear-gradient(180deg, rgba(255, 238, 246, 0.90), rgba(255, 218, 234, 0.82));

    border: 2px solid rgba(255, 211, 226, 0.9);

    box-shadow:
        0 12px 28px rgba(130, 38, 78, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);

    color: #6b2944;
    text-align: center;

    opacity: 0;
    transform-origin: center;

    transition:
        opacity 0.35s ease,
        transform 0.35s cubic-bezier(.2, .9, .2, 1);

    pointer-events: none;
    overflow: hidden;
    }

    .vip-widget.show {
        opacity: 1;
        transform: translateX(-50%) translateY(40px) scale(0.8);
        }

    .vip-widget::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.55) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255, 157, 195, 0.28) 0 2px, transparent 3px);
      background-size: 38px 38px, 54px 54px;
      animation: sparkleDrift 8s linear infinite;
      opacity: 0.55;
      pointer-events: none;
    }

    .vip-content {
      position: relative;
      z-index: 2;
    }

    .vip-kicker {
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #9a4263;
      margin-bottom: 8px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
    }

    .vip-main {
      font-size: 28px;
      line-height: 1.12;
      font-weight: 950;
      color: #5f2340;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.86),
        0 2px 8px rgba(129, 36, 75, 0.14);
    }

    .vip-main strong { color: #b03368; }

    .vip-sub {
      margin-top: 8px;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 800;
      color: #7e3b55;
    }

    .celebration {
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.98), transparent 44%),
        linear-gradient(180deg, rgba(255, 241, 225, 0.94), rgba(255, 216, 234, 0.88));
      border-color: rgba(255, 225, 178, 0.96);
      box-shadow:
        0 18px 44px rgba(154, 83, 27, 0.22),
        0 0 0 4px rgba(255, 236, 198, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.82);
      color: #743c21;
      animation: celebratePulse 1.1s ease-in-out infinite;
    }

    .celebration .vip-kicker { color: #9b6128; }
    .celebration .vip-main { color: #7a371f; }
    .celebration .vip-main strong { color: #c24674; }
    .celebration .vip-sub { color: #874a2c; }

    @keyframes sparkleDrift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(36px, 36px) rotate(8deg); }
    }

    @keyframes celebratePulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-2px) scale(1.018); }
    }

    @media (max-width: 700px) {
      .vip-widget { width: 92vw; }
      .vip-main { font-size: 23px; }
      .vip-sub { font-size: 15px; }
    }
  </style>
</head>

<body>
  <div id="vipWidget" class="vip-widget">
    <div class="vip-content">
      <div id="vipKicker" class="vip-kicker">Recompensa cerca</div>
      <div id="vipMain" class="vip-main"></div>
      <div id="vipSub" class="vip-sub"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const socketUrl = params.get("socketUrl") || "http://127.0.0.1:3002";

    const META_MONEDAS = Number(params.get("meta") || 1500);
    const UMBRAL_CERCA = Number(params.get("umbral") || 300);
    const DURACION_PROGRESO = Number(params.get("duracionProgreso") || 8500);
    const DURACION_LOGRO = Number(params.get("duracionLogro") || 7000);
    const MODO_ANONIMO = params.get("anonimo") === "1";

    const vipWidget = document.getElementById("vipWidget");
    const vipKicker = document.getElementById("vipKicker");
    const vipMain = document.getElementById("vipMain");
    const vipSub = document.getElementById("vipSub");

    let hideTimer = null;
    let lastShownKey = "";
    let lastShownAt = 0;

    function safeName(value) {
      return String(value || "Alguien")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getNombre(cliente) {
      if (MODO_ANONIMO) return "Alguien";

      return safeName(
        cliente?.username ||
        cliente?.nickname ||
        cliente?.uniqueId ||
        "Alguien"
      );
    }

    function getFaltan(cliente) {
      const monedas = Number(cliente?.monedasAcumuladas || 0);
      const progreso = monedas % META_MONEDAS;

      if (progreso === 0) return META_MONEDAS;

      return META_MONEDAS - progreso;
    }

    function puedeMostrar(cliente) {
      if (!cliente) return false;

      const esVip = cliente.esVip === true;
      const esCaserito = cliente.esCaserito === true;

      if (!esVip && !esCaserito) return false;

      const faltan = getFaltan(cliente);

      return faltan > 0 && faltan <= UMBRAL_CERCA;
    }

    function getTextoProgreso(nombre, faltan) {
      if (MODO_ANONIMO) {
        if (faltan <= 50) {
          return {
            kicker: "Está a nada",
            main: `Alguien está a <strong>${faltan}</strong> monedas`,
            sub: "de desbloquear su pregunta extensa GRATIS 💖"
          };
        }

        return {
          kicker: "Recompensa cerca",
          main: `Alguien está a <strong>${faltan}</strong> monedas`,
          sub: "de desbloquear algo especial 👀"
        };
      }

      if (faltan <= 50) {
        return {
          kicker: "Está a nada",
          main: `${nombre} está a <strong>${faltan}</strong> monedas`,
          sub: "de su pregunta extensa GRATIS 💖"
        };
      }

      if (faltan <= 150) {
        return {
          kicker: "Muy cerca",
          main: `${nombre} está a <strong>${faltan}</strong> monedas`,
          sub: "de desbloquear su recompensa ✨"
        };
      }

      return {
        kicker: "Recompensa cerca",
        main: `${nombre} está a <strong>${faltan}</strong> monedas`,
        sub: "de su pregunta extensa GRATIS 💖"
      };
    }

    function showCard({ kicker, main, sub, celebration = false, duration = 8000 }) {
      clearTimeout(hideTimer);

      vipWidget.classList.toggle("celebration", celebration);
      vipKicker.innerHTML = kicker;
      vipMain.innerHTML = main;
      vipSub.innerHTML = sub;

      vipWidget.classList.add("show");

      hideTimer = setTimeout(() => {
        vipWidget.classList.remove("show");
      }, duration);
    }

    function mostrarProgreso(cliente) {
      const faltan = getFaltan(cliente);
      const nombre = getNombre(cliente);
      const key = `${cliente.id || cliente.uniqueId || cliente.username}|${faltan}`;
      const now = Date.now();

      if (key === lastShownKey && now - lastShownAt < 12000) return;

      lastShownKey = key;
      lastShownAt = now;

      const text = getTextoProgreso(nombre, faltan);

      showCard({
        ...text,
        celebration: false,
        duration: DURACION_PROGRESO
      });
    }

    function mostrarLogro(data) {
      const nombre = MODO_ANONIMO ? "Alguien" : safeName(data?.username || data?.nickname || "Alguien");

      showCard({
        kicker: "Recompensa desbloqueada",
        main: `🎉 ${nombre} lo logró`,
        sub: "su pregunta extensa GRATIS ya está lista 💖",
        celebration: true,
        duration: DURACION_LOGRO
      });
    }

    const socket = io(socketUrl, {
      transports: ["polling", "websocket"],
      reconnection: true
    });

    socket.on("clientesVip:update", (clientes) => {
      const lista = Array.isArray(clientes) ? clientes : [];

      const candidatos = lista
        .filter(puedeMostrar)
        .sort((a, b) => getFaltan(a) - getFaltan(b));

      if (!candidatos.length) return;

      mostrarProgreso(candidatos[0]);
    });

    socket.on("vip:reward", (data) => {
      mostrarLogro(data);
    });

    socket.on("connect", async () => {
      try {
        const res = await fetch(`${socketUrl}/clientes-vip`);
        const clientes = await res.json();

        const candidatos = Array.isArray(clientes)
          ? clientes.filter(puedeMostrar).sort((a, b) => getFaltan(a) - getFaltan(b))
          : [];

        if (candidatos.length) {
          setTimeout(() => mostrarProgreso(candidatos[0]), 900);
        }
      } catch (error) {
        console.error("No se pudo cargar clientes-vip:", error);
      }
    });
  </script>
</body>
</html>
