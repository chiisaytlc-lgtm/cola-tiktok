<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cola TikTok</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #4a3a3a;
    }

    .container {
      width: 270px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 6px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 182, 193, 0.22);
      box-shadow: 0 4px 12px rgba(255, 192, 203, 0.14);
    }

    .item.current {
      background: linear-gradient(
        90deg,
        rgba(255, 220, 230, 0.82),
        rgba(255, 190, 210, 0.72)
      );
      border: 1px solid rgba(255, 160, 190, 0.4);
      box-shadow: 0 6px 16px rgba(255, 150, 180, 0.24);
    }

    .index {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255, 182, 193, 0.9);
      color: #5a2e2e;
    }

    .item.current .index {
      background: #ff8fb1;
      color: white;
    }

    .icon {
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      font-size: 14px;
    }

    .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
      color: #5a3d3d;
    }

    .status {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 182, 193, 0.2);
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #6b4a4a;
    }

    .small-status {
      padding: 7px 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid rgba(255, 182, 193, 0.18);
      font-size: 12px;
      font-weight: 600;
      color: #7e5d69;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container" id="queue"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const queueEl = document.getElementById("queue");

    const params = new URLSearchParams(window.location.search);
    const socketUrl = params.get("socketUrl") || "http://127.0.0.1:3002";

    const MAX_VISIBLE = 6; // cambia a 7 si luego quieres ver 7 posiciones

    let visibleQueue = {
      current: null,
      premiumList: [],
      normalList: [],
      fastList: [],
      specialList: [],
      nextList: [],
      counts: {
        total: 0,
        especial: 0,
        premium: 0,
        normal: 0,
        rapida: 0
      }
    };

    function getName(item) {
      return (
        item?.nickname ||
        item?.username ||
        item?.userName ||
        item?.customerName ||
        item?.name ||
        item?.uniqueId ||
        item?.user?.nickname ||
        item?.user?.uniqueId ||
        "Usuario"
      );
    }

    function renderQueueItem(item, index, options = {}) {
      const { current = false } = options;
      const name = getName(item);
      const icon = item?.icon || "✨";

      return `
        <div class="item ${current ? "current" : ""}">
          <div class="index">${index}</div>
          <div class="icon">${icon}</div>
          <div class="name">${name}</div>
        </div>
      `;
    }

    function render() {
      const current = visibleQueue?.current || null;

      let premiumList = Array.isArray(visibleQueue?.premiumList) ? visibleQueue.premiumList : [];
      let normalList = Array.isArray(visibleQueue?.normalList) ? visibleQueue.normalList : [];
      let fastList = Array.isArray(visibleQueue?.fastList) ? visibleQueue.fastList : [];

      if (!premiumList.length && !normalList.length && Array.isArray(visibleQueue?.nextList)) {
        normalList = visibleQueue.nextList;
      }

      const orderedWaiting = [...premiumList, ...normalList, ...fastList];
      const visibleSlots = current ? MAX_VISIBLE - 1 : MAX_VISIBLE;
      const visibleWaiting = orderedWaiting.slice(0, visibleSlots);

      const counts = visibleQueue?.counts || {};
      const totalWaiting =
        (counts.premium || 0) +
        (counts.normal || 0) +
        (counts.rapida || 0);

      let html = "";

      if (current) {
        html += renderQueueItem(current, "•", { current: true });
      }

      html += visibleWaiting
        .map((item, index) => renderQueueItem(item, index + 1))
        .join("");

      if (!current && !visibleWaiting.length) {
        queueEl.innerHTML = '<div class="status">Sin cola</div>';
        return;
      }

      const hiddenWaiting = Math.max(totalWaiting - visibleWaiting.length, 0);

      if (hiddenWaiting > 0) {
        html += `<div class="small-status">+${hiddenWaiting} en espera</div>`;
      }

      queueEl.innerHTML = html;
    }

    const socket = io(socketUrl, {
      transports: ["polling", "websocket"],
      reconnection: true
    });

    socket.on("queue:visible", (data) => {
      visibleQueue = data || {};
      render();
    });

    socket.on("connect", async () => {
      try {
        const res = await fetch(`${socketUrl}/queue-visible`);
        const data = await res.json();
        visibleQueue = data || {};
        render();
      } catch (error) {
        console.error("No se pudo cargar queue-visible:", error);
      }
    });

    socket.on("connect_error", () => {
      queueEl.innerHTML = '<div class="status">Sin conexión</div>';
    });

    render();
  </script>
</body>
</html>
