<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cola TikTok</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #4a3a3a;
    }

    .container {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 6px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 182, 193, 0.22);
      box-shadow: 0 4px 12px rgba(255, 192, 203, 0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .item.current {
      background: linear-gradient(
        90deg,
        rgba(255, 220, 230, 0.88),
        rgba(255, 190, 210, 0.78)
      );
      border: 1px solid rgba(255, 160, 190, 0.45);
      box-shadow: 0 6px 16px rgba(255, 150, 180, 0.24);
    }

    .item.premium {
      background: linear-gradient(
        90deg,
        rgba(255, 244, 248, 0.84),
        rgba(255, 226, 236, 0.74)
      );
      border: 1px solid rgba(238, 177, 203, 0.34);
    }

    .item.fast {
      background: rgba(255, 255, 255, 0.30);
    }

    @keyframes highlightPulse {
      0% {
        transform: scale(1);
        box-shadow: 0 4px 12px rgba(255, 192, 203, 0.14);
      }
      30% {
        transform: scale(1.08);
        box-shadow: 0 0 22px rgba(255, 120, 180, 0.95);
      }
      60% {
        transform: scale(1.04);
        box-shadow: 0 0 16px rgba(255, 120, 180, 0.75);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 4px 12px rgba(255, 192, 203, 0.14);
      }
    }

    .highlight-user {
      animation: highlightPulse 0.85s ease;
      border: 2px solid rgba(255, 120, 180, 0.88) !important;
      background: linear-gradient(
        90deg,
        rgba(255, 236, 244, 0.96),
        rgba(255, 214, 229, 0.92)
      ) !important;
    }

    .index {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255, 182, 193, 0.9);
      color: #5a2e2e;
    }

    .item.current .index {
      background: #ff8fb1;
      color: white;
    }

    .icon {
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      font-size: 14px;
    }

    .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 700;
      color: #5a3d3d;
    }

    .badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      color: #7f5365;
    }

    .item.current .badge {
      background: rgba(255, 255, 255, 0.72);
      color: #8b4760;
    }

    .status {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 182, 193, 0.2);
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #6b4a4a;
    }

    .small-status {
      padding: 7px 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid rgba(255, 182, 193, 0.18);
      font-size: 12px;
      font-weight: 600;
      color: #7e5d69;
      text-align: center;
    }

    .special-note {
      padding: 7px 10px;
      border-radius: 16px;
      background: rgba(255, 245, 249, 0.36);
      border: 1px solid rgba(233, 180, 203, 0.20);
      font-size: 11px;
      font-weight: 700;
      color: #8c6173;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container" id="queue"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const queueEl = document.getElementById("queue");

    const params = new URLSearchParams(window.location.search);
    const socketUrl = params.get("socketUrl") || "http://127.0.0.1:3002";

    const MAX_VISIBLE = 6;

    let visibleQueue = {
      current: null,
      premiumList: [],
      normalList: [],
      fastList: [],
      specialList: [],
      nextList: [],
      counts: {
        total: 0,
        especial: 0,
        premium: 0,
        normal: 0,
        rapida: 0
      }
    };

    let highlightedUser = null;
    let highlightTimer = null;

    function normalizeName(value) {
      return String(value || "").trim().toLowerCase();
    }

    function getName(item) {
      return (
        item?.nickname ||
        item?.username ||
        item?.userName ||
        item?.customerName ||
        item?.name ||
        item?.uniqueId ||
        item?.user?.nickname ||
        item?.user?.uniqueId ||
        "Usuario"
      );
    }

    function getQueueTypeLabel(item) {
      const q = item?.queueType || "normal";
      if (q === "premium") return "VIP";
      if (q === "rapida") return "Rápida";
      if (q === "normal") return "Normal";
      if (q === "especial") return "Especial";
      return "";
    }

    function getItemClass(item, current = false) {
      if (current) return "current";
      if (item?.queueType === "premium") return "premium";
      if (item?.queueType === "rapida") return "fast";
      return "";
    }

    function isHighlightedItem(item) {
      if (!highlightedUser) return false;
      return normalizeName(getName(item)) === normalizeName(highlightedUser);
    }

    function renderQueueItem(item, index, options = {}) {
      const { current = false } = options;
      const name = getName(item);
      const icon = item?.icon || "✨";
      const badge = getQueueTypeLabel(item);
      const highlightedClass = isHighlightedItem(item) ? "highlight-user" : "";

      return `
        <div class="item ${getItemClass(item, current)} ${highlightedClass}">
          <div class="index">${index}</div>
          <div class="icon">${icon}</div>
          <div class="name">${name}</div>
          ${badge ? `<div class="badge">${badge}</div>` : ""}
        </div>
      `;
    }

    function render() {
      const current = visibleQueue?.current || null;

      let premiumList = Array.isArray(visibleQueue?.premiumList) ? visibleQueue.premiumList : [];
      let normalList = Array.isArray(visibleQueue?.normalList) ? visibleQueue.normalList : [];
      let fastList = Array.isArray(visibleQueue?.fastList) ? visibleQueue.fastList : [];
      let specialList = Array.isArray(visibleQueue?.specialList) ? visibleQueue.specialList : [];

      if (!premiumList.length && !normalList.length && Array.isArray(visibleQueue?.nextList)) {
        normalList = visibleQueue.nextList;
      }

      const orderedWaiting = [...premiumList, ...specialList, ...normalList, ...fastList];
      const visibleSlots = current ? MAX_VISIBLE - 1 : MAX_VISIBLE;
      const visibleWaiting = orderedWaiting.slice(0, visibleSlots);

      const counts = visibleQueue?.counts || {};
      const totalWaiting =
        (counts.premium || 0) +
        (counts.especial || 0) +
        (counts.normal || 0) +
        (counts.rapida || 0);

      let html = "";

      if (current) {
        html += renderQueueItem(current, "•", { current: true });
      }

      html += visibleWaiting
        .map((item, index) => renderQueueItem(item, index + 1))
        .join("");

      if (!current && !visibleWaiting.length) {
        queueEl.innerHTML = '<div class="status">Sin cola</div>';
        return;
      }

      const hiddenWaiting = Math.max(totalWaiting - visibleWaiting.length, 0);

      if (hiddenWaiting > 0) {
        html += `<div class="small-status">+${hiddenWaiting} en espera</div>`;
      }

      if ((counts.especial || 0) > 0 || specialList.length > 0) {
        html += `<div class="special-note">🔒 ${counts.especial} lectura(s) privada(s) reservada(s)</div>`;      }

      queueEl.innerHTML = html;
    }

    function triggerUserHighlight(username) {
      if (!username) return;

      highlightedUser = username;
      render();

      clearTimeout(highlightTimer);
      highlightTimer = setTimeout(() => {
        highlightedUser = null;
        render();
      }, 2000);
    }

    const socket = io(socketUrl, {
      transports: ["polling", "websocket"],
      reconnection: true
    });

    socket.on("queue:visible", (data) => {
      visibleQueue = data || {};
      render();
    });

    socket.on("gift:premium", (payload) => {
      if (!payload?.username) return;
      triggerUserHighlight(payload.username);
    });

    socket.on("connect", async () => {
      try {
        const res = await fetch(`${socketUrl}/queue-visible`);
        const data = await res.json();
        visibleQueue = data || {};
        render();
      } catch (error) {
        console.error("No se pudo cargar queue-visible:", error);
      }
    });

    socket.on("connect_error", () => {
      queueEl.innerHTML = '<div class="status">Sin conexión</div>';
    });

    render();
  </script>
</body>
</html>
