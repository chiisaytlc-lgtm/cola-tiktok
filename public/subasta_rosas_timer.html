<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Subasta de Rosas - Timer</title>
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Georgia, serif;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  width: 96vw;
  height: 96vh;
  padding: 18px;
  border-radius: 28px;
  text-align: center;
  background:
    radial-gradient(circle at top, rgba(255, 0, 120, .28), transparent 35%),
    linear-gradient(160deg, rgba(35,0,20,.92), rgba(92,0,49,.92), rgba(20,0,13,.92));
  border: 3px solid #ff8ac8;
  box-shadow: 0 0 25px rgba(255, 79, 175, .8);
  color: white;

  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
}

h1 {
  font-size: clamp(34px, 7vw, 72px);
  line-height: 1;
  margin: 0;
  color: #fff1f8;
  text-shadow: 0 0 18px #ff4faf;
}

h2 {
  font-size: clamp(20px, 4vw, 42px);
  line-height: 1;
  margin: 0;
  color: #ffb6dd;
}

.label {
  font-size: clamp(16px, 2.8vw, 30px);
  color: #ffd978;
  font-weight: bold;
  letter-spacing: 2px;
}

#timer {
  font-size: clamp(58px, 16vw, 150px);
  line-height: 1;
  font-weight: bold;
  color: #ffe7f3;
  text-shadow: 0 0 25px #ff1493;
  margin: 4px 0;
}

.text {
  font-size: clamp(17px, 3.4vw, 34px);
  line-height: 1.15;
  color: #ffd978;
  font-weight: bold;
}

.bottom {
  font-size: clamp(15px, 3vw, 28px);
  line-height: 1.2;
  background: rgba(255,255,255,.10);
  padding: 10px 14px;
  border-radius: 18px;
  margin-top: 4px;
}

button {
  align-self: center;
  font-size: clamp(14px, 2.5vw, 22px);
  padding: 8px 22px;
  border: none;
  border-radius: 18px;
  background: #ff4faf;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>
  <div class="overlay">
    <h1>SUBASTA</h1>
    <h2>de Rosas 🌹</h2>

    <div class="text">TIEMPO RESTANTE</div>
    <div id="timer">03:00</div>

    <div class="text">La persona que más rosas envíe gana</div>

    <div class="bottom">
      Envía 🌹 rosas para participar en la subasta
    </div>

    <button onclick="startTimer()">Iniciar / Reiniciar</button>
  </div>

<script>
let duration = 3 * 60;
let remaining = duration;
let interval = null;

function updateTimer() {
  const minutes = String(Math.floor(remaining / 60)).padStart(2, "0");
  const seconds = String(remaining % 60).padStart(2, "0");
  document.getElementById("timer").textContent = `${minutes}:${seconds}`;
}

function startTimer() {
  clearInterval(interval);
  remaining = duration;
  updateTimer();

  interval = setInterval(() => {
    remaining--;

    if (remaining <= 0) {
      remaining = 0;
      updateTimer();
      clearInterval(interval);
      document.getElementById("timer").textContent = "¡FIN!";
      return;
    }

    updateTimer();
  }, 1000);
}

updateTimer();
startTimer();
</script>
</body>
</html>
